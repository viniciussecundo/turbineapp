<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="rocketGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="flameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="50%" style="stop-color:#EAB308"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
  </defs>
  
  <!-- Círculo de fundo -->
  <circle cx="50" cy="50" r="48" fill="url(#rocketGradient)"/>
  
  <!-- Corpo do foguete -->
  <path d="M50 15 C50 15 65 35 65 55 C65 65 58 72 50 72 C42 72 35 65 35 55 C35 35 50 15 50 15 Z" fill="white"/>
  
  <!-- Janela do foguete -->
  <circle cx="50" cy="45" r="8" fill="url(#rocketGradient)"/>
  <circle cx="50" cy="45" r="5" fill="#1a1a2e" opacity="0.8"/>
  
  <!-- Asas do foguete -->
  <path d="M35 55 L25 70 L35 65 Z" fill="white"/>
  <path d="M65 55 L75 70 L65 65 Z" fill="white"/>
  
  <!-- Chamas -->
  <path d="M42 72 L50 90 L58 72 Q50 78 42 72 Z" fill="url(#flameGradient)"/>
  <path d="M45 72 L50 82 L55 72 Q50 76 45 72 Z" fill="#FBBF24"/>
